<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUNSF Event Registration</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-8">

  <div class="bg-white shadow-xl rounded-2xl max-w-2xl w-full p-6 md:p-10 border border-slate-100">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">TEST Event Registration</h1>
      <p class="text-slate-500 mt-2">Please complete the form below to secure your spot.</p>
    </div>

    <form id="registrationForm" class="space-y-6">

      <div>
        <label for="fullName" class="block text-sm font-semibold text-slate-700 mb-1">Full Name *</label>
        <input type="text" id="fullName" required placeholder="John Doe"
          class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email Address *</label>
          <input type="email" id="email" required placeholder="you@college.edu"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        <div>
          <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1">Phone Number *</label>
          <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="10-digit mobile number"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label for="college" class="block text-sm font-semibold text-slate-700 mb-1">College *</label>
          <input type="text" id="college" required placeholder="Engineering College"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        <div>
          <label for="branch" class="block text-sm font-semibold text-slate-700 mb-1">Branch *</label>
          <input type="text" id="branch" required placeholder="CSE, ECE, etc."
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        <div>
          <label for="year" class="block text-sm font-semibold text-slate-700 mb-1">Year *</label>
          <select id="year" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            <option value="" disabled selected>Select Year</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>
      </div>

      <hr class="border-slate-100 my-6">

      <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 space-y-4">
        <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Payment Details</h3>

        <div>
          <label for="utrField" class="block text-sm font-semibold text-slate-700 mb-1">UTR / Ref Number *</label>
          <input type="text" id="utrField" required placeholder="Enter 12-digit UTR Ref No."
            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Upload Payment Screenshot *</label>
          <input type="file" id="screenshotInput" accept="image/png, image/jpeg, image/jpg" required
            class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
          <p class="text-xs text-slate-400 mt-1">Accepts PNG, JPG, or JPEG up to 4MB.</p>
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition flex items-center justify-center cursor-pointer">
        <span id="btnText">Submit Registration</span>
      </button>

    </form>
  </div>

  <script>
    // REPLACE THIS STRING WITH YOUR LIVE DEPLOYED WEB APP URL
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycby5bz0GI20VxLh_FQOESgzX9V1N54KaPxHuDKlSZT_uu7rswK8QfU0gbxW4k3BSCfqpXQ/exec";

    const form = document.getElementById('registrationForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fileInput = document.getElementById('screenshotInput');
      const file = fileInput.files[0];
      if (file && file.size > 4 * 1024 * 1024) {
        alert("File size is too large! Please upload a screenshot under 4MB.");
        return;
      }

      // Set UI loading states
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
      btnText.innerText = "Processing Details & Uploading...";

      try {
        const base64Image = await toBase64(file);

        // Form bundle mapping directly to the script API variables
        const payload = {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          college: document.getElementById('college').value,
          branch: document.getElementById('branch').value,
          year: document.getElementById('year').value,
          utr: document.getElementById('utrField').value, // Completely updated to utr
          imageBase64: base64Image,
          imageType: file.type
        };

        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === 'success') {
          alert("Registration submitted successfully! Your submission is pending payment verification.");
          form.reset();
        } else {
          // Remedy 1: Capture and display the clean duplicate error message
          alert("Submission Blocked: " + result.message);
        }

      } catch (error) {
        console.error("Transmission Error:", error);
        alert("Network Error: If you are encountering errors or resubmitting a corrected entry, do not create a new form. Please contact the organizing committee.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        btnText.innerText = "Submit Registration";
      }
    });

    const toBase64 = file => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  </script>
</body>

</html>
